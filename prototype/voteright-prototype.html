<title>VoteRight — Design System &amp; Scorecard Prototype</title>
<style>
  :root {
    --ground: #F2F4F0; --surface: #FBFCFA; --surface-2: #ECEFEA;
    --ink: #1A1F1C; --muted: #5C665F; --line: #D8DED7;
    --ev: #1D6069; --ev-soft: #1D60691A;
    --adv: #8F6410; --adv-soft: #8F641016;
    --agree: #1D6069; --agree-mid: #DEEBEA;
    --differ: #A24A33; --differ-mid: #F0DFD9;
    --kept: #2E6B3F; --broken: #99372F; --pending: #A06A1A;
    --chip-neutral: #E4E8E2;
    --shadow: 0 10px 30px rgba(20,25,22,0.10), 0 1px 3px rgba(20,25,22,0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #121614; --surface: #1B211E; --surface-2: #232A26;
      --ink: #E9EDE9; --muted: #9CA79F; --line: #353D38;
      --ev: #74BDB7; --ev-soft: #74BDB71F;
      --adv: #E2B05C; --adv-soft: #E2B05C1C;
      --agree: #74BDB7; --agree-mid: #2A3E3C;
      --differ: #DE9276; --differ-mid: #43302A;
      --kept: #79C48C; --broken: #E08B82; --pending: #E2B05C;
      --chip-neutral: #2A312C;
      --shadow: 0 10px 30px rgba(0,0,0,0.45), 0 1px 3px rgba(0,0,0,0.4);
    }
  }
  :root[data-theme="dark"] {
    --ground: #121614; --surface: #1B211E; --surface-2: #232A26;
    --ink: #E9EDE9; --muted: #9CA79F; --line: #353D38;
    --ev: #74BDB7; --ev-soft: #74BDB71F;
    --adv: #E2B05C; --adv-soft: #E2B05C1C;
    --agree: #74BDB7; --agree-mid: #2A3E3C;
    --differ: #DE9276; --differ-mid: #43302A;
    --kept: #79C48C; --broken: #E08B82; --pending: #E2B05C;
    --chip-neutral: #2A312C;
    --shadow: 0 10px 30px rgba(0,0,0,0.45), 0 1px 3px rgba(0,0,0,0.4);
  }
  :root[data-theme="light"] {
    --ground: #F2F4F0; --surface: #FBFCFA; --surface-2: #ECEFEA;
    --ink: #1A1F1C; --muted: #5C665F; --line: #D8DED7;
    --ev: #1D6069; --ev-soft: #1D60691A;
    --adv: #8F6410; --adv-soft: #8F641016;
    --agree: #1D6069; --agree-mid: #DEEBEA;
    --differ: #A24A33; --differ-mid: #F0DFD9;
    --kept: #2E6B3F; --broken: #99372F; --pending: #A06A1A;
    --chip-neutral: #E4E8E2;
    --shadow: 0 10px 30px rgba(20,25,22,0.10), 0 1px 3px rgba(20,25,22,0.08);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--ground); color: var(--ink);
    font-family: -apple-system, "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px; line-height: 1.55;
  }
  ::selection { background: var(--ev-soft); }
  .serif { font-family: "Iowan Old Style", "Sitka Text", Charter, Georgia, serif; }
  .mono { font-family: ui-monospace, "SFMono-Regular", Consolas, Menlo, monospace; }
  a { color: var(--ev); }
  button { font: inherit; color: inherit; cursor: pointer; }
  button:focus-visible, [tabindex]:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--ev); outline-offset: 2px; border-radius: 4px;
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }

  /* ── Top chrome ─────────────────────────────── */
  header.site {
    max-width: 1080px; margin: 0 auto; padding: 1.1rem 1.25rem 0.5rem;
    display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  }
  .wordmark { font-family: "Iowan Old Style", "Sitka Text", Charter, Georgia, serif; font-weight: 700; font-size: 1.25rem; }
  .wordmark small { display: block; font-family: -apple-system, "Segoe UI", system-ui, sans-serif; font-weight: 500; font-size: 0.68rem; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); }
  .tabs { display: flex; gap: 0.25rem; margin-left: auto; background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 0.2rem; }
  .tabs button {
    border: none; background: transparent; border-radius: 999px; padding: 0.35rem 0.9rem;
    font-size: 0.85rem; font-weight: 600; color: var(--muted);
  }
  .tabs button[aria-selected="true"] { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.12); }
  .langs { display: flex; gap: 0.25rem; }
  .langs button { border: 1px solid var(--line); background: var(--surface); border-radius: 6px; padding: 0.25rem 0.55rem; font-size: 0.78rem; font-weight: 700; color: var(--muted); }
  .langs button[aria-pressed="true"] { color: var(--ev); border-color: var(--ev); }

  main.stage { max-width: 1080px; margin: 0 auto; padding: 1rem 1.25rem 4rem; }

  /* ── Phone frame ────────────────────────────── */
  .phone {
    width: min(430px, 100%); margin: 0 auto; background: var(--surface);
    border: 1px solid var(--line); border-radius: 26px; box-shadow: var(--shadow);
    min-height: 740px; display: flex; flex-direction: column; overflow: hidden;
  }
  @media (max-width: 500px) { .phone { border-radius: 0; border-left: none; border-right: none; min-height: 88vh; } }
  .appbar {
    display: flex; align-items: center; gap: 0.6rem; padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--line); background: var(--surface);
  }
  .appbar .back { border: 1px solid var(--line); background: var(--surface-2); border-radius: 8px; padding: 0.2rem 0.6rem; font-size: 0.95rem; }
  .appbar .title { font-weight: 700; font-size: 0.98rem; }
  .appbar .where { margin-left: auto; font-size: 0.7rem; color: var(--muted); text-align: right; line-height: 1.3; }
  .screen { flex: 1; overflow-y: auto; padding: 1rem 1rem 1.5rem; }

  /* ── Registers ──────────────────────────────── */
  .chip {
    display: inline-flex; align-items: center; gap: 0.35rem;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.02em;
    padding: 0.18rem 0.55rem; border-radius: 999px; border: 1px solid transparent;
    white-space: nowrap;
  }
  .chip.cite {
    font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; font-weight: 600;
    font-size: 0.68rem; color: var(--ev); border-color: var(--ev);
    background: var(--ev-soft); border-radius: 5px; white-space: normal;
  }
  .chip.adv { color: var(--adv); border-color: var(--adv); background: var(--adv-soft); border-radius: 5px;
    font-family: ui-monospace, "SFMono-Regular", Consolas, monospace; font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .band { border-radius: 6px; }
  .band.b2  { background: var(--agree); color: var(--surface); }
  .band.b1  { background: var(--agree-mid); color: var(--ink); border-color: var(--agree); }
  .band.b0  { background: var(--chip-neutral); color: var(--ink); border-color: var(--line); }
  .band.bm1 { background: var(--differ-mid); color: var(--ink); border-color: var(--differ); }
  .band.bm2 { background: var(--differ); color: var(--surface); }
  .band.bnull { background: transparent; color: var(--muted); border: 1.5px dashed var(--line); }
  .pill { font-size: 0.7rem; font-weight: 700; padding: 0.12rem 0.5rem; border-radius: 999px; display: inline-flex; gap: 0.3rem; align-items: center; }
  .pill.kept { color: var(--kept); background: color-mix(in srgb, var(--kept) 14%, transparent); }
  .pill.broken { color: var(--broken); background: color-mix(in srgb, var(--broken) 14%, transparent); }
  .pill.pending { color: var(--pending); background: color-mix(in srgb, var(--pending) 14%, transparent); }
  .pill.neutral { color: var(--muted); background: var(--chip-neutral); }

  .disclosure {
    display: flex; gap: 0.55rem; align-items: flex-start;
    border: 1.5px solid var(--adv); background: var(--adv-soft); color: var(--ink);
    border-radius: 8px; padding: 0.6rem 0.75rem; font-size: 0.78rem; margin: 0.75rem 0;
  }
  .disclosure .tag { flex: 0 0 auto; font-family: ui-monospace, Consolas, monospace; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--adv); border: 1.5px solid var(--adv); border-radius: 4px; padding: 0.1rem 0.35rem; transform: rotate(-1.5deg); margin-top: 0.1rem; }

  .privnote { display: flex; gap: 0.45rem; align-items: center; font-size: 0.74rem; color: var(--muted); }
  .privnote .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex: 0 0 auto; }
  .privnote.public .dot { background: var(--adv); }
  .privnote.private .dot { background: var(--ev); }

  /* ── Cards & controls ───────────────────────── */
  .card { border: 1px solid var(--line); border-radius: 12px; background: var(--surface); padding: 0.85rem 0.9rem; margin: 0.6rem 0; }
  .card.raised { background: var(--surface-2); }
  .card h4 { margin: 0 0 0.25rem; font-size: 0.95rem; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
    border: none; border-radius: 10px; padding: 0.7rem 1.1rem; font-weight: 700; font-size: 0.95rem;
    background: var(--ev); color: var(--surface); width: 100%;
  }
  .btn.secondary { background: var(--surface-2); color: var(--ink); border: 1px solid var(--line); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .seg { display: flex; background: var(--surface-2); border: 1px solid var(--line); border-radius: 9px; padding: 0.15rem; gap: 0.15rem; }
  .seg button { flex: 1; border: none; background: transparent; border-radius: 7px; padding: 0.4rem 0.5rem; font-size: 0.8rem; font-weight: 650; color: var(--muted); }
  .seg button[aria-pressed="true"] { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
  textarea.statement {
    width: 100%; border: 1px solid var(--line); border-radius: 8px; background: var(--surface);
    color: var(--ink); font: inherit; font-size: 0.88rem; padding: 0.5rem 0.6rem; resize: vertical; min-height: 3.2em;
  }
  .weight { display: flex; gap: 0.3rem; align-items: center; }
  .weight button { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--line); background: var(--surface); font-weight: 800; }
  .weight .wval { min-width: 8ch; text-align: center; font-size: 0.78rem; font-weight: 700; color: var(--ev); }
  .topichead { display: flex; align-items: center; gap: 0.5rem; width: 100%; background: none; border: none; padding: 0; text-align: left; }
  .topichead .tname { font-weight: 700; font-size: 0.95rem; flex: 1; }
  .topichead .state { font-size: 0.72rem; color: var(--muted); }
  .check { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--line); display: inline-flex; align-items: center; justify-content: center; font-size: 0.8rem; color: var(--surface); flex: 0 0 auto; }
  .check.on { background: var(--ev); border-color: var(--ev); }

  .cand { width: 100%; text-align: left; border: 1px solid var(--line); background: var(--surface); border-radius: 12px; padding: 0.8rem 0.9rem; margin: 0.55rem 0; display: block; }
  .cand:hover { border-color: var(--ev); }
  .cand .row1 { display: flex; align-items: baseline; gap: 0.5rem; }
  .cand .cname { font-weight: 750; font-size: 1.02rem; }
  .cand .cparty { font-size: 0.7rem; color: var(--muted); }
  .cand .inc { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ev); border: 1px solid var(--ev); border-radius: 4px; padding: 0.05rem 0.3rem; }
  .cand .row2 { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.45rem; flex-wrap: wrap; }
  .cand .cover { font-size: 0.7rem; color: var(--muted); }
  .cand.insuff { border-style: dashed; }
  .dots { display: inline-flex; gap: 4px; }
  .dots i { width: 11px; height: 11px; border-radius: 3px; display: inline-block; border: 1px solid var(--line); }
  .dots i.d2 { background: var(--agree); border-color: var(--agree); }
  .dots i.d1 { background: var(--agree-mid); border-color: var(--agree); }
  .dots i.d0 { background: var(--chip-neutral); }
  .dots i.dm1 { background: var(--differ-mid); border-color: var(--differ); }
  .dots i.dm2 { background: var(--differ); border-color: var(--differ); }
  .dots i.dnull { background: transparent; border-style: dashed; }

  .topicrow { border-top: 1px solid var(--line); padding: 0.75rem 0; }
  .topicrow .yours { font-size: 0.78rem; color: var(--muted); margin: 0.15rem 0 0.4rem; }
  .topicrow .yours q { font-style: italic; }
  .topicrow .theirs { font-size: 0.88rem; margin: 0.2rem 0 0.4rem; }
  .trhead { display: flex; align-items: center; gap: 0.5rem; }
  .trhead .tn { font-weight: 700; font-size: 0.9rem; flex: 1; }
  .evrow { font-family: ui-monospace, Consolas, monospace; font-size: 0.68rem; color: var(--ev); background: var(--ev-soft); border-left: 3px solid var(--ev); border-radius: 0 5px 5px 0; padding: 0.35rem 0.55rem; margin-top: 0.35rem; }
  .nopos { font-size: 0.8rem; color: var(--muted); font-style: italic; }

  .sysgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; align-items: start; }
  .sys h2 { font-family: "Iowan Old Style", "Sitka Text", Charter, Georgia, serif; font-size: 1.4rem; border-top: 1px solid var(--line); padding-top: 1.4rem; margin-top: 2rem; text-wrap: balance; }
  .sys h3 { font-size: 1.02rem; margin: 1.2rem 0 0.4rem; }
  .sys p { max-width: 68ch; }
  .sw { display: flex; align-items: center; gap: 0.6rem; padding: 0.35rem 0; font-size: 0.8rem; }
  .sw i { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--line); flex: 0 0 auto; }
  .sw code { background: var(--surface-2); border-radius: 4px; padding: 0.05rem 0.35rem; font-size: 0.72rem; }
  .typerow { border-top: 1px solid var(--line); padding: 0.5rem 0; }

  /* ── Your ballot ────────────────────────────── */
  .grouph { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin: 1rem 0 0.25rem; }
  .seat { display: flex; align-items: center; gap: 0.5rem; border: 1px solid var(--line); background: var(--surface); border-radius: 10px; padding: 0.55rem 0.7rem; margin: 0.35rem 0; width: 100%; text-align: left; }
  .seat .sname { font-weight: 650; font-size: 0.88rem; flex: 1; }
  .seat .smeta { font-size: 0.66rem; color: var(--muted); display: block; font-weight: 400; margin-top: 0.05rem; }
  button.seat:hover { border-color: var(--ev); }
  .seat .snote { flex-basis: 100%; font-size: 0.72rem; color: var(--muted); font-style: italic; margin-top: 0.15rem; }
  .seat.wrap { flex-wrap: wrap; }
  .stackchips { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.55rem 0 0.2rem; }
  .stackchips span { font-size: 0.68rem; border: 1px solid var(--line); background: var(--surface-2); border-radius: 999px; padding: 0.1rem 0.5rem; color: var(--muted); font-weight: 600; }

  /* ── Mandate grid & promise timelines ───────── */
  .mgridwrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 10px; margin: 0.7rem 0; }
  .mgrid { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  .mgrid th, .mgrid td { border-bottom: 1px solid var(--line); padding: 0.5rem 0.35rem; text-align: center; vertical-align: middle; }
  .mgrid tr:last-child td { border-bottom: none; }
  .mgrid th { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 750; background: var(--surface-2); }
  .mgrid td.cn { text-align: left; font-weight: 650; font-size: 0.8rem; padding-left: 0.6rem; }
  .cellbtn { border: 1px solid transparent; background: none; padding: 0.2rem 0.55rem; border-radius: 7px; font-weight: 800; font-size: 0.9rem; }
  .cellbtn:hover { border-color: var(--line); }
  .cellbtn[aria-pressed="true"] { border-color: var(--ev); background: var(--ev-soft); }
  .c-commit { color: var(--agree); }
  .c-decline { color: var(--differ); }
  .c-none { color: var(--muted); }
  .histline { display: flex; gap: 0.5rem; align-items: baseline; font-size: 0.76rem; padding: 0.22rem 0 0.22rem 0.6rem; border-left: 2px solid var(--line); margin-left: 0.2rem; flex-wrap: wrap; }
  .histline .hd { font-family: ui-monospace, Consolas, monospace; color: var(--muted); font-size: 0.66rem; min-width: 5.4ch; }
  .histline .hl { font-weight: 750; min-width: 8ch; }
  .reply { border-left: 3px solid var(--adv); background: var(--adv-soft); padding: 0.4rem 0.6rem; border-radius: 0 5px 5px 0; font-size: 0.75rem; margin-top: 0.35rem; }
  .reply b { color: var(--adv); font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.07em; display: block; margin-bottom: 0.1rem; }

  /* ── Attributed-analysis register (commentary, §8.2) ── */
  .chip.analysis {
    color: var(--muted); border: 1.5px dotted var(--muted); background: transparent;
    border-radius: 5px; font-family: ui-monospace, Consolas, monospace;
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    white-space: normal;
  }
  .card.analysis { border-style: dotted; }
  .commitem { padding: 0.45rem 0; border-top: 1px solid var(--line); }
  .commitem:first-of-type { border-top: none; padding-top: 0.1rem; }
  .commitem .ct { font-family: "Iowan Old Style", "Sitka Text", Charter, Georgia, serif; font-size: 0.92rem; font-weight: 650; }
  .commitem .cb { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; }

  /* ── Debate thread ──────────────────────────── */
  .sidechip { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; border-radius: 4px; padding: 0.12rem 0.45rem; }
  .sidechip.for { background: var(--agree-mid); color: var(--ink); border: 1px solid var(--agree); }
  .sidechip.against { background: var(--differ-mid); color: var(--ink); border: 1px solid var(--differ); }
  .clcard .cnum { font-size: 0.7rem; color: var(--muted); }
  .repq { border-left: 3px solid var(--line); padding: 0.3rem 0 0.3rem 0.6rem; margin: 0.45rem 0; font-size: 0.85rem; }
  .repq .by { font-size: 0.7rem; color: var(--muted); margin-top: 0.15rem; }
  .agrrow { display: flex; gap: 0.35rem; align-items: center; flex-wrap: wrap; margin-top: 0.45rem; }
  .agrrow button { border: 1px solid var(--line); background: var(--surface); border-radius: 999px; padding: 0.2rem 0.7rem; font-size: 0.74rem; font-weight: 700; color: var(--muted); }
  .agrrow button[aria-pressed="true"] { border-color: var(--ev); color: var(--ev); background: var(--ev-soft); }
  .aicard { border: 1.5px dashed var(--line); border-radius: 12px; padding: 0.85rem 0.9rem; margin: 0.6rem 0; background: var(--surface); }
  .bridge { border: 1.5px solid var(--agree); background: var(--agree-mid); border-radius: 10px; padding: 0.7rem 0.85rem; margin: 0.7rem 0; }
  .bridge .bl { font-size: 0.64rem; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; color: var(--agree); display: block; margin-bottom: 0.25rem; }
  .campcard { border: 1px solid var(--line); border-radius: 12px; padding: 0.75rem 0.85rem; margin: 0.5rem 0; background: var(--surface); }
  .ctqbar { height: 8px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--line); overflow: hidden; margin: 0.45rem 0 0.3rem; }
  .ctqbar i { display: block; height: 100%; background: var(--ev); }
  .ctqmark { position: relative; }
  .claimprompt { border: 1.5px solid var(--adv); background: var(--adv-soft); border-radius: 8px; padding: 0.6rem 0.7rem; margin-top: 0.5rem; font-size: 0.82rem; }
  .claimprompt .row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .claimprompt button { border: 1px solid var(--adv); background: var(--surface); color: var(--ink); border-radius: 8px; padding: 0.3rem 0.7rem; font-size: 0.76rem; font-weight: 700; }

  /* ── Admin console (internal tool: dense, desktop-grade, deliberately plain) ── */
  .adm { max-width: 920px; margin: 0 auto; }
  .adm .banner { display: flex; gap: 0.6rem; align-items: center; border: 1px solid var(--line); background: var(--surface-2); border-radius: 8px; padding: 0.5rem 0.8rem; font-size: 0.78rem; color: var(--muted); margin: 0.5rem 0 1rem; }
  .adm h2 { font-family: "Iowan Old Style", "Sitka Text", Charter, Georgia, serif; font-size: 1.25rem; margin: 1.2rem 0 0.4rem; }
  .admtabs { display: flex; gap: 0.25rem; background: var(--surface-2); border: 1px solid var(--line); border-radius: 9px; padding: 0.18rem; width: fit-content; }
  .admtabs button { border: none; background: transparent; border-radius: 7px; padding: 0.35rem 0.85rem; font-size: 0.82rem; font-weight: 650; color: var(--muted); }
  .admtabs button[aria-pressed="true"] { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
  .pill.open { color: var(--pending); background: color-mix(in srgb, var(--pending) 14%, transparent); }
  .pill.published { color: var(--broken); background: color-mix(in srgb, var(--broken) 14%, transparent); }
  .gatebtn { border: 1px dashed var(--line); background: transparent; color: var(--muted); border-radius: 8px; padding: 0.45rem 0.9rem; font-size: 0.8rem; font-weight: 700; cursor: not-allowed; }
  .gatebtn small { display: block; font-weight: 400; font-size: 0.66rem; font-family: ui-monospace, Consolas, monospace; }
  .qmeta { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: baseline; }

<script>

document.getElementById('view-sys').innerHTML = `

  <h2>Principles</h2>

    <div class="card"><h4>4 · Calm over engagement</h4>
      <p style="font-size:0.85rem">No infinite feeds, no streaks, no outrage mechanics, no red/blue party

  </div>

  <h2>The two registers</h2>
  <div class="card" style="max-width:560px">
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.6rem">
      <span class="chip cite">▣ Recorded vote · Legistar · Bill 15-23 · 2023-07 · archived ✓</span>
      <span class="chip adv">Unofficial · advisory</span>
    </div>
    <p style="font-size:0.82rem;color:var(--muted);margin:0">Sourced fact (teal, mono, squared) never shares
    a visual treatment with community opinion or advisory results (gold, stamped, uppercase). The
    disclosure banner is non-removable on every advisory surface:</p>
    <div class="disclosure"><span class="tag">Unofficial</span><span>This is an unofficial, advisory poll.

    <p style="font-size:0.82rem;color:var(--muted)">A third, quieter treatment exists for <strong>attributed

  <p style="font-size:0.85rem;color:var(--muted)">Sage-tinted neutrals (chosen, not defaulted); teal and gold

  <div class="sysgrid">
    <div class="card">

    </div>
    <div class="card">
      <h4>Registers</h4>
      <div class="sw"><i style="background:var(--ev)"></i><code>--ev</code> evidence · #1D6069 / #74BDB7</div>
      <div class="sw"><i style="background:var(--adv)"></i><code>--adv</code> advisory · #8F6410 / #E2B05C</div>
      <h4 style="margin-top:0.8rem">Diverging agreement pair</h4>
      <div class="sw"><i style="background:var(--agree)"></i><code>--agree</code> aligns · = evidence teal</div>
      <div class="sw"><i style="background:var(--chip-neutral)"></i>neutral midpoint (gray, never a hue)</div>
      <div class="sw"><i style="background:var(--differ)"></i><code>--differ</code> differs · #A24A33 / #DE9276</div>

    <div class="card">

      <div class="sw"><i style="background:var(--kept)"></i><code>--kept</code> #2E6B3F / #79C48C</div>
      <div class="sw"><i style="background:var(--broken)"></i><code>--broken</code> #99372F / #E08B82</div>

  <h2>The agreement scale</h2>
  <p style="font-size:0.85rem;color:var(--muted);max-width:70ch">Agreement is a polarity, so it gets a proper

  manufactures precision the methodology can't back (§5.1); a band states exactly as much as we know. Every

  <div class="card" style="max-width:640px;display:flex;gap:0.4rem;flex-wrap:wrap">
    <span class="chip band b2">Aligns strongly</span>

    <span class="chip band bm1">Leans opposed</span>

    <span class="chip band bnull">No public position</span>
  </div>

  <h2>Type</h2>
  <div class="card" style="max-width:640px">
    <div class="typerow serif" style="font-size:1.6rem;font-weight:700">Display — Iowan Old Style / Charter / Georgia</div>
    <div class="typerow" style="font-size:0.95rem">UI text — system sans (−apple-system, Segoe UI). Running text ≤ 68ch.</div>
    <div class="typerow mono" style="font-size:0.78rem;color:var(--ev)">Data &amp; citations — ui-monospace · tabular-nums · always in the evidence register</div>
    <div class="typerow" style="font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)">Labels — 0.72rem · uppercase · letter-spaced</div>

  <h2>Act labeling</h2>

    </div>

  <h2>Fairness patterns</h2>
  <div class="sysgrid">

      "No public position found. Not counted for or against — shown so silence stays visible."
      A candidate with too little public record gets <span class="chip band bnull">Not enough information</span>,
      sorted last with a dashed card — never hidden, never punished with a low score.</p></div>
    <div class="card"><h4>No response is a fact, not an accusation</h4>
      <p style="font-size:0.82rem">On mandate commitments, <span class="chip band bnull">No response</span> always

    <div class="card"><h4>Party is metadata, not identity</h4>
      <p style="font-size:0.82rem">Party appears as small text after the name. Nothing in the palette maps to
      a party; candidate cards differ only by their relationship to <em>your</em> priorities.</p></div>
  </div>`;
</script>
<script>
'use strict';

/* ─────────────────────────── state ─────────────────────────── */
const S = {
  lang: 'en', view: 'proto', screen: 'welcome',
  race: 'atlarge', candId: null, open: null, addr: 'ss',
  dv: 'clusters', showOrig: false, openCluster: null, ctq: false, claim: null,
  agreeVotes: {}, threadBack: 'welcome',
  adm: { tab: 'disputes', stage: 0, resolved: null, queue: { q1: 'pending', q2: 'pending', q3: 'pending' }, values: { q1: 1, q2: -2, q3: 2 } },
  prios: {} // topicId -> { statement, stance: 1|-1, w: 1..5 }
};
const t = (k) => (I18N[S.lang][k] !== undefined ? I18N[S.lang][k] : k);
const tt = (obj, base) => obj[base + '_' + S.lang] !== undefined ? obj[base + '_' + S.lang] : obj[S.lang];
const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

/* ─────────────────────────── scoring ───────────────────────── */
function topicAgreement(cand, topicId) {
  const st = cand.st[topicId];
  if (!st || st.pos === null || st.pos === undefined) return null;
  const p = S.prios[topicId];
  const raw = st.pos * p.stance;                    // -4..4 conceptually, pos in -2..2 → raw -2..2
  return Math.max(-2, Math.min(2, raw));
}
function scoreCand(cand) {
  let num = 0, wAns = 0, wAll = 0;
  const perTopic = {};
  for (const [tid, p] of Object.entries(S.prios)) {
    wAll += p.w;
    const a = topicAgreement(cand, tid);
    perTopic[tid] = a;
    if (a !== null) { num += p.w * a; wAns += p.w; }
  }
  const coverage = wAll ? wAns / wAll : 0;
  const score = wAns ? num / (2 * wAns) : 0;        // -1..1
  // dealbreaker rule (SCORING.md S5): a weight-5 priority at agreement <= -1 marks the
  // card visibly but never changes the aggregate — the voter judges
  const db = Object.entries(S.prios).some(([tid, p]) => p.w === 5 && perTopic[tid] !== null && perTopic[tid] !== undefined && perTopic[tid] <= -1);
  let band;
  if (coverage < 0.5) band = 'insuff';
  else if (score >= 0.55) band = 'strong';
  else if (score >= 0.2) band = 'good';
  else if (score > -0.2) band = 'mixed';
  else band = 'weak';
  return { score, coverage, band, db, perTopic, nAns: Object.values(perTopic).filter(v => v !== null).length, nAll: Object.keys(perTopic).length };
}
const OV_LABEL = { strong: 'ov_strong', good: 'ov_good', mixed: 'ov_mixed', weak: 'ov_weak', insuff: 'ov_insuff' };
const OV_CLASS = { strong: 'b2', good: 'b1', mixed: 'b0', weak: 'bm1', insuff: 'bnull' };
function bandChip(a) {
  if (a === null) return '<span class="chip band bnull">' + t('bandnull') + '</span>';
  const map = { '2': ['b2', 'band2'], '1': ['b1', 'band1'], '0': ['b0', 'band0'], '-1': ['bm1', 'bandm1'], '-2': ['bm2', 'bandm2'] };
  const [cls, key] = map[String(a)];
  return '<span class="chip band ' + cls + '">' + t(key) + '</span>';
}
function dot(a) {
  const cls = a === null ? 'dnull' : ({ '2': 'd2', '1': 'd1', '0': 'd0', '-1': 'dm1', '-2': 'dm2' })[String(a)];
  return '<i class="' + cls + '"></i>';
}
function citeChip(src) {
  if (!src) return '';
  const label = SRC_LABEL[src.type][S.lang];
  return '<span class="chip cite" title="' + t('sourced') + '">▣ ' + esc(label) + ' · ' + esc(src.pub) + ' · ' + esc(src.date) + ' · ' + t('archived') + ' ✓</span>';
}

/* ─────────────────────────── screens ───────────────────────── */
function renderWelcome() {
  return `
    <div style="padding-top:1.5rem">
      <div class="serif" style="font-size:1.7rem;font-weight:700;line-height:1.2;text-wrap:balance">${t('welcome_h')}</div>
      <p style="color:var(--muted);font-size:0.95rem">${t('welcome_p')}</p>
      <div class="card raised">
        <div class="privnote private"><span class="dot"></span><span>${t('welcome_priv')}</span></div>
      </div>
      <div class="disclosure"><span class="tag">${t('fictional')}</span><span>${t('welcome_fict')}</span></div>
      <button class="btn" onclick="VR.go('ballot')" style="margin-top:0.5rem">${t('get_started')}</button>
      <button class="btn secondary" onclick="VR.openThread('welcome')" style="margin-top:0.5rem">${t('see_debate')}</button>
    </div>`;
}

function renderBallot() {
  const stack = STACKS[S.addr].map(x => '<span>' + esc(x) + '</span>').join('');
  const groups = SEATS.filter(g => !g.only || g.only === S.addr).map(g => {
    const rows = g.rows.map(row => {
      const name = esc(row[S.lang].replace('{d}', row.d ? row.d[S.addr] : ''));
      const meta = t(row.meta);
      if (row.st === 'match') {
        return `<button class="seat" onclick="VR.pickRace('${row.race}')">
          <span class="sname">${name}<span class="smeta">${meta}</span></span>
          <span class="chip band b2">${t('st_match')} →</span></button>`;
      }
      if (row.st === 'jud') {
        return `<div class="seat wrap">
          <span class="sname">${name}<span class="smeta">${meta}</span></span>
          <span class="chip band bnull">⚖ ${t('st_jud')}</span>
          <span class="snote">${t('jud_note')}</span></div>`;
      }
      return `<div class="seat">
        <span class="sname">${name}<span class="smeta">${meta}</span></span>
        <span class="chip band bnull">${t('st_later')}</span></div>`;
    }).join('');
    return '<div class="grouph">' + t(g.grp) + '</div>' + rows;
  }).join('');
  return `
    <div class="serif" style="font-size:1.35rem;font-weight:700">${t('ballot_h')}</div>
    <p style="color:var(--muted);font-size:0.85rem;margin-top:0.25rem">${t('ballot_p')}</p>
    <div class="seg" role="group">
      <button aria-pressed="${S.addr === 'ss'}" onclick="VR.setAddr('ss')">${t('addr_ss')}</button>
      <button aria-pressed="${S.addr === 'rock'}" onclick="VR.setAddr('rock')">${t('addr_rock')}</button>
    </div>
    <div style="font-size:0.72rem;color:var(--muted);margin-top:0.6rem">${t('resolves')}</div>
    <div class="stackchips">${stack}</div>
    ${groups}
    <p style="font-size:0.74rem;color:var(--muted);font-style:italic">${t('later_note')}</p>
    <button class="btn" style="margin-top:0.4rem" onclick="VR.go('prio')">${t('to_prio')}</button>`;
}

function renderPrio() {
  const chosen = Object.keys(S.prios).length;
  const rows = TOPICS.map(tp => {
    const sel = S.prios[tp.id];
    const openMe = S.open === tp.id;
    let body = '';
    if (sel && openMe) {
      body = `
        <div style="margin-top:0.6rem;display:flex;flex-direction:column;gap:0.55rem">
          <textarea class="statement" aria-label="${esc(tp[S.lang])}" onchange="VR.setStmt('${tp.id}', this.value)">${esc(sel.statement)}</textarea>
          <div class="seg" role="group">
            <button aria-pressed="${sel.stance === 1}" onclick="VR.setStance('${tp.id}',1)">${t('stance_agree')}</button>
            <button aria-pressed="${sel.stance === -1}" onclick="VR.setStance('${tp.id}',-1)">${t('stance_oppose')}</button>
          </div>
          <div class="weight">
            <button aria-label="less" onclick="VR.setW('${tp.id}',-1)">−</button>
            <span class="wval">${'●'.repeat(sel.w)}${'○'.repeat(5 - sel.w)}<br>${t('weight_lbl')[sel.w]}</span>
            <button aria-label="more" onclick="VR.setW('${tp.id}',1)">+</button>
          </div>
        </div>`;
    }
    return `
      <div class="card">
        <button class="topichead" onclick="VR.toggleTopic('${tp.id}')" aria-expanded="${!!openMe}">
          <span class="check ${sel ? 'on' : ''}">${sel ? '✓' : ''}</span>
          <span class="tname">${esc(tp[S.lang])}</span>
          <span class="state">${sel ? t('prio_state_on') : t('prio_state_off')}</span>
        </button>
        ${body}
      </div>`;
  }).join('');
  return `
    <div class="serif" style="font-size:1.35rem;font-weight:700">${t('prio_h')}</div>
    <p style="color:var(--muted);font-size:0.85rem;margin-top:0.25rem">${t('prio_p')}</p>
    ${rows}
    <button class="btn" style="margin-top:0.6rem" ${chosen >= 3 ? '' : 'disabled'} onclick="VR.go('results')">${chosen >= 3 ? t('see_matches') : t('need_more')}</button>
    <div class="privnote private" style="margin-top:0.7rem"><span class="dot"></span><span>${t('priv_footer')}</span></div>`;
}

function renderResults() {
  const cands = CANDS.filter(c => c.race === S.race).map(c => ({ c, r: scoreCand(c) }));
  cands.sort((a, b) => (a.r.band === 'insuff') - (b.r.band === 'insuff') || b.r.score - a.r.score);
  const note = S.race === 'atlarge' ? t('atlarge_note') : t('exec_note');
  const cards = cands.map(({ c, r }) => {
    const dots = Object.keys(S.prios).map(tid => dot(r.perTopic[tid])).join('');
    const insuff = r.band === 'insuff';
    return `
      <button class="cand ${insuff ? 'insuff' : ''}" onclick="VR.openCand('${c.id}')">
        <div class="row1">
          <span class="cname">${esc(c.name)}</span>
          <span class="cparty">(${c.party})</span>
          ${c.inc ? '<span class="inc">' + t('incumbent') + '</span>' : ''}
        </div>
        <div class="row2">
          <span class="chip band ${OV_CLASS[r.band]}">${t(OV_LABEL[r.band])}</span>
          <span class="dots" aria-hidden="true">${dots}</span>
          <span class="cover">${t('based_on')} ${r.nAns}/${r.nAll} ${t('of_your')} ${t('priorities_w')}</span>
        </div>
        ${r.db ? '<div style="margin-top:0.4rem"><span class="chip band bm1">⚠ ' + t('deal_mark') + '</span></div>' : ''}
        ${insuff ? '<div class="nopos" style="margin-top:0.4rem">' + t('insuff_note') + '</div>' : ''}
      </button>`;
  }).join('');
  return `
    <div class="serif" style="font-size:1.35rem;font-weight:700">${t('results_h')}</div>
    <div class="seg" role="group" style="margin:0.6rem 0 0.3rem">
      <button aria-pressed="${S.race === 'atlarge'}" onclick="VR.setRace('atlarge')">${t('race_atlarge')}</button>
      <button aria-pressed="${S.race === 'exec'}" onclick="VR.setRace('exec')">${t('race_exec')}</button>
    </div>
    <p style="font-size:0.78rem;color:var(--muted);margin:0.35rem 0 0.2rem">${note}</p>
    ${S.race === 'atlarge' ? '<button class="btn secondary" style="margin:0.2rem 0 0.1rem" onclick="VR.openGrid()">' + t('see_grid') + ' →</button>' : ''}
    <div class="disclosure"><span class="tag">${t('fictional')}</span><span>${t('welcome_fict')}</span></div>
    ${cards}`;
}

function renderMandates() {
  const cands = CANDS.filter(c => c.race === 'atlarge');
  const mids = Object.keys(MANDATES);
  const head = '<tr><th style="text-align:left;padding-left:0.6rem"></th>' + mids.map(mid => '<th>' + esc(MANDATES[mid]['short_' + S.lang]) + '</th>').join('') + '</tr>';
  const rows = cands.map(c => {
    const cells = mids.map(mid => {
      const m = c.mandates[mid];
      const sym = m.s === 'commit' ? '<span class="c-commit">✓</span>' : m.s === 'decline' ? '<span class="c-decline">✗</span>' : '<span class="c-none">—</span>';
      const lbl = m.s === 'commit' ? t('m_commit') : m.s === 'decline' ? t('m_decline') : t('m_nores');
      const sel = S.cell && S.cell.cid === c.id && S.cell.mid === mid;
      return '<td><button class="cellbtn" aria-pressed="' + sel + '" aria-label="' + esc(c.name) + ' — ' + esc(MANDATES[mid]['short_' + S.lang]) + ' — ' + lbl + '" onclick="VR.selCell(\'' + c.id + '\',\'' + mid + '\')">' + sym + '</button></td>';
    }).join('');
    return '<tr><td class="cn">' + esc(c.name) + '</td>' + cells + '</tr>';
  }).join('');

  const mandateCards = mids.map(mid => {
    const md = MANDATES[mid];
    return `<div class="card" style="border-color:var(--adv);padding:0.6rem 0.75rem">
      <span class="chip adv">${t('unofficial')}</span>
      <div class="serif" style="font-size:0.9rem;margin:0.3rem 0 0.1rem">${md['q_' + S.lang]}</div>
      <div style="font-size:0.74rem;color:var(--muted)">${md['res_' + S.lang]}</div>
    </div>`;
  }).join('');

  let strip = '';
  if (S.cell) {
    const c = CANDS.find(x => x.id === S.cell.cid);
    const md = MANDATES[S.cell.mid];
    const m = c.mandates[S.cell.mid];
    const stance = m.s === 'commit' ? '<span class="chip band b2">✓ ' + t('m_commit') + '</span>'
      : m.s === 'decline' ? '<span class="chip band bm2">' + t('m_decline') + '</span>'
      : '<span class="chip band bnull">' + t('m_nores') + '</span>';
    const body = m.s === 'no_response'
      ? '<div class="nopos" style="margin-top:0.35rem">' + t('m_nores_note') + '</div>'
      : '<div style="font-size:0.8rem;margin-top:0.35rem">' + esc(m[S.lang]) + '</div>' + citeChip(m.src);
    strip = `<div class="card raised"><h4>${esc(c.name)} · ${esc(md['short_' + S.lang])}</h4><div style="margin-top:0.25rem">${stance}</div>${body}</div>`;
  }

  return `
    <div class="serif" style="font-size:1.3rem;font-weight:700;line-height:1.25">${t('grid_h')}</div>
    <p style="color:var(--muted);font-size:0.82rem;margin-top:0.3rem">${t('grid_p')}</p>
    ${mandateCards}
    <div class="mgridwrap"><table class="mgrid">${head}${rows}</table></div>
    <div style="font-size:0.72rem;color:var(--muted)">${t('grid_legend')} · ${t('tap_cell')}</div>
    ${strip}
    <div class="disclosure" style="margin-top:0.8rem"><span class="tag">${t('unofficial')}</span><span>${t('mandate_disc')}</span></div>
    <p style="font-size:0.78rem;color:var(--ev);font-weight:600">${t('grid_loop')}</p>
    <button class="btn secondary" onclick="VR.openThread('mandates')">${t('deb_from_grid')} →</button>`;
}

function renderPromises() {
  const c = CANDS.find(x => x.id === S.candId);
  const HP = { pending: 'h_pending', inprog: 'h_inprog', kept: 'h_kept', broken: 'h_broken', comp: 'h_comp', stalled: 'h_stalled' };
  const PILL = { kept: 'kept', broken: 'broken', inprog: 'pending', comp: 'pending', stalled: 'neutral' };
  const PLBL = { kept: 'p_kept', broken: 'p_broken', inprog: 'p_inprog', comp: 'p_compromised', stalled: 'p_stalled' };
  const ICON = { kept: '✓', broken: '✗', inprog: '⟳', comp: '◑', stalled: '⏸' };
  const cards = c.promises.list.map(p => {
    const hist = p.hist.map(ev =>
      '<div class="histline"><span class="hd">' + ev.d + '</span><span class="hl">' + t(HP[ev.h]) + '</span><span style="flex:1;min-width:12ch">' + esc(ev[S.lang]) + '</span>' + (ev.src ? citeChip(ev.src) : '') + '</div>').join('');
    const reply = p.reply ? '<div class="reply"><b>' + t('reply_lbl') + '</b>' + esc(p.reply[S.lang]) + '</div>' : '';
    return `<div class="card">
      <div style="display:flex;gap:0.5rem;align-items:baseline;flex-wrap:wrap">
        <h4 style="flex:1;margin:0">${esc(p[S.lang])}</h4>
        <span class="pill ${PILL[p.status]}">${ICON[p.status]} ${t(PLBL[p.status])}</span>
      </div>
      <div style="margin-top:0.45rem">${hist}</div>
      ${reply}
    </div>`;
  }).join('');
  return `
    <div class="serif" style="font-size:1.35rem;font-weight:700">${esc(c.name)}</div>
    <p style="color:var(--muted);font-size:0.8rem;margin-top:0.2rem">${t('promises_h')}</p>
    ${cards}
    <p style="font-size:0.74rem;color:var(--muted);font-style:italic">${t('hist_note')}</p>`;
}

function renderDetail() {
  const c = CANDS.find(x => x.id === S.candId);
  const r = scoreCand(c);
  const rows = Object.entries(S.prios).map(([tid, p]) => {
    const tp = TOPICS.find(x => x.id === tid);
    const st = c.st[tid];
    const a = r.perTopic[tid];
    let theirs;
    if (a === null) {
      theirs = '<div class="nopos">' + t('nopos_row') + '</div>';
    } else {
      theirs = '<div class="theirs">' + esc(st[S.lang]) + '</div>' + citeChip(st.src);
      if (st.src && st.src.type === 'vote') {
        theirs += '<div class="evrow">' + t('source_vote') + ' · ' + esc(st.src.pub) + ' · ' + esc(st.src.date) + '</div>';
      }
    }
    return `
      <div class="topicrow">
        <div class="trhead"><span class="tn">${esc(tp[S.lang])}</span>${bandChip(a)}</div>
        <div class="yours">${t('your_words')} <q>${esc(p.statement)}</q> · ${t('weight_lbl')[p.w]}</div>
        ${theirs}
      </div>`;
  }).join('');

  let promises;
  if (c.promises) {
    const pr = c.promises;
    promises = `
      <div class="card">
        <h4>${t('promises_h')}</h4>
        <div style="display:flex;gap:0.35rem;flex-wrap:wrap;margin:0.3rem 0 0.5rem">
          ${pr.kept ? '<span class="pill kept">✓ ' + pr.kept + ' ' + t('p_kept') + '</span>' : ''}
          ${pr.broken ? '<span class="pill broken">✗ ' + pr.broken + ' ' + t('p_broken') + '</span>' : ''}
          ${pr.inprog ? '<span class="pill pending">⟳ ' + pr.inprog + ' ' + t('p_inprog') + '</span>' : ''}
          ${pr.comp ? '<span class="pill pending">◑ ' + pr.comp + ' ' + t('p_compromised') + '</span>' : ''}
          ${pr.stalled ? '<span class="pill neutral">⏸ ' + pr.stalled + ' ' + t('p_stalled') + '</span>' : ''}
        </div>
        <div style="font-size:0.8rem;color:var(--muted)">${esc(pr.ex[S.lang])}</div>
        ${pr.list ? '<button class="btn secondary" style="margin-top:0.55rem" onclick="VR.go(\'promises\')">' + t('full_record') + ' →</button>' : ''}
      </div>`;
  } else {
    promises = `<div class="card"><h4>${t('promises_h')}</h4><div class="nopos">${t('promises_none')}</div></div>`;
  }

  let mandate;
  if (S.race === 'atlarge') {
    const blocks = Object.keys(MANDATES).map(mid => {
      const md = MANDATES[mid];
      const m = c.mandates[mid];
      let stance;
      if (m.s === 'commit') stance = '<span class="chip band b2">✓ ' + t('m_commit') + '</span> <div style="font-size:0.8rem;margin-top:0.35rem">' + t('committed_src') + ' ' + esc(m[S.lang]) + '</div>' + citeChip(m.src);
      else if (m.s === 'decline') stance = '<span class="chip band bm2">' + t('m_decline') + '</span> <div style="font-size:0.8rem;margin-top:0.35rem">' + t('committed_src') + ' ' + esc(m[S.lang]) + '</div>' + citeChip(m.src);
      else stance = '<span class="chip band bnull">' + t('m_nores') + '</span> <div class="nopos" style="margin-top:0.35rem">' + t('m_nores_note') + '</div>';
      return `
        <div class="serif" style="font-size:0.95rem;margin:0.6rem 0 0.2rem">${md['q_' + S.lang]}</div>
        <div style="font-size:0.76rem;color:var(--muted)">${md['res_' + S.lang]}</div>
        <div style="margin:0.45rem 0 0.2rem">${stance}</div>`;
    }).join('<div style="border-top:1px solid var(--line);margin-top:0.6rem"></div>');
    mandate = `
      <div class="card" style="border-color:var(--adv)">
        <div style="display:flex;gap:0.4rem;align-items:center;margin-bottom:0.3rem">
          <span class="chip adv">${t('unofficial')}</span>
        </div>
        <h4>${t('mandate_h')}</h4>
        ${blocks}
        <div style="font-size:0.72rem;color:var(--muted);margin-top:0.6rem;border-top:1px solid var(--line);padding-top:0.45rem">${t('mandate_disc')}</div>
      </div>`;
  } else {
    mandate = `<div class="card" style="border-color:var(--adv)"><span class="chip adv">${t('unofficial')}</span><div class="nopos" style="margin-top:0.4rem">${t('mandate_none')}</div></div>`;
  }

  let commentary = '';
  const pieces = COMMENTARY[c.id];
  if (pieces) {
    const items = pieces.map(p => {
      const cm = COMMENTATORS[p.c];
      return `<div class="commitem">
        <div class="ct">${esc(p['t_' + S.lang])}</div>
        <div class="cb">${esc(cm.name)} · ${esc(cm.outlet)} · ${p.d} — ${esc(cm['aff_' + S.lang])}</div>
      </div>`;
    }).join('');
    const cm0 = COMMENTATORS[pieces[0].c];
    commentary = `
      <div class="card analysis">
        <div style="display:flex;gap:0.4rem;align-items:center;margin-bottom:0.35rem;flex-wrap:wrap">
          <h4 style="flex:1;margin:0">${t('comm_h')}</h4>
          <span class="chip analysis">${t('comm_reg')}</span>
        </div>
        ${items}
        <div style="font-size:0.7rem;color:var(--muted);border-top:1px solid var(--line);margin-top:0.4rem;padding-top:0.4rem">
          ${esc(cm0['rule_' + S.lang])} ${t('comm_how')} ${t('comm_blackout')}
        </div>
      </div>`;
  }

  return `
    <div class="row1" style="display:flex;align-items:baseline;gap:0.5rem">
      <span class="serif" style="font-size:1.45rem;font-weight:700">${esc(c.name)}</span>
      <span style="font-size:0.75rem;color:var(--muted)">(${c.party})</span>
      ${c.inc ? '<span class="inc" style="font-size:0.62rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--ev);border:1px solid var(--ev);border-radius:4px;padding:0.05rem 0.3rem">' + t('incumbent') + '</span>' : ''}
    </div>
    <div style="display:flex;align-items:center;gap:0.5rem;margin:0.4rem 0 0.8rem;flex-wrap:wrap">
      <span class="chip band ${OV_CLASS[r.band]}">${t(OV_LABEL[r.band])}</span>
      ${r.db ? '<span class="chip band bm1">⚠ ' + t('deal_mark') + '</span>' : ''}
      <span style="font-size:0.72rem;color:var(--muted)">${t('based_on')} ${r.nAns}/${r.nAll} ${t('of_your')} ${t('priorities_w')}</span>
    </div>
    ${rows}
    ${promises}
    ${mandate}
    ${commentary}
    <div style="display:flex;flex-direction:column;gap:0.6rem;margin-top:0.9rem">
      <div>
        <button class="btn secondary">${t('save_plan')}</button>
        <div class="privnote private" style="margin-top:0.3rem"><span class="dot"></span><span>${t('save_priv')}</span></div>
      </div>
      <div>
        <button class="btn secondary">${t('share_card')}</button>
        <div class="privnote public" style="margin-top:0.3rem"><span class="dot"></span><span>${t('share_pub')}</span></div>
      </div>
    </div>`;
}

function renderThread() {
  const D = DEBATE;
  const L = S.lang;

  // proposal header + amendment history
  const body = S.showOrig
    ? '<div class="card raised"><div style="font-size:0.7rem;color:var(--adv);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.25rem">' + t('orig_lbl') + '</div><div style="font-size:0.86rem">' + esc(D['orig_' + L]) + '</div></div>'
    : '<p style="font-size:0.88rem;margin:0.4rem 0">' + esc(D['body_' + L]) + '</p>';

  // calling the question
  const votes = D.ctq.votes + (S.ctq ? 1 : 0);
  const pct = Math.round(votes / D.ctq.active * 1000) / 10;
  const ctq = `
    <div class="card">
      <h4>${t('ctq_h')}</h4>
      <div style="font-size:0.76rem;color:var(--muted)">${votes} ${t('of_active')} · ${pct}% / 66.7%</div>
      <div class="ctqbar" role="img" aria-label="${pct}% of 66.7%"><i style="width:${Math.min(100, pct / 66.7 * 100)}%"></i></div>
      <div style="font-size:0.72rem;color:var(--muted)">${t('ctq_note')}</div>
      ${S.ctq
        ? '<div class="privnote private" style="margin-top:0.5rem"><span class="dot"></span><span>' + t('ctq_voted') + '</span></div>'
        : '<button class="btn secondary" style="margin-top:0.5rem" onclick="VR.ctqVote()">' + t('ctq_btn') + '</button>'}
    </div>`;

  const agrBtns = (id) => {
    const v = S.agreeVotes[id];
    return `<div class="agrrow">
      <button aria-pressed="${v === 'agree'}" onclick="VR.agr('${id}','agree')">${t('agree')}</button>
      <button aria-pressed="${v === 'disagree'}" onclick="VR.agr('${id}','disagree')">${t('disagree')}</button>
      <button aria-pressed="${v === 'pass'}" onclick="VR.agr('${id}','pass')">${t('pass_b')}</button>
    </div>`;
  };

  let main = '';
  if (S.dv === 'clusters') {
    const cards = D.clusters.map(cl => {
      const open = S.openCluster === cl.id;
      const member = open && cl.member ? `
        <div class="repq" style="border-left-style:dotted">
          <div style="font-size:0.82rem;font-style:italic">${esc(cl.member['t_' + L])}</div>
          <div class="by">${esc(cl.member.by)}${cl.member.audio ? ' · 🎧 ' + t('audio_lbl') : ''}</div>
        </div>` : '';
      return `
      <div class="card clcard">
        <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
          <span class="sidechip ${cl.side}">${t(cl.side === 'for' ? 'side_for' : 'side_against')}</span>
          <span class="cnum">${cl.n} ${t('made_point')} · ${cl.helpful} ${t('helpful_w')}</span>
        </div>
        <div style="font-weight:700;font-size:0.94rem;margin-top:0.35rem">${esc(cl['sum_' + L])}</div>
        <div class="repq">
          <div>${esc(cl.rep['t_' + L])}</div>
          <div class="by">${esc(cl.rep.by)}</div>
          <div style="margin-top:0.3rem;display:flex;gap:0.3rem;flex-wrap:wrap">${cl.rep.cites.map(c => '<span class="chip cite">▣ ' + esc(c) + ' · ' + t('archived') + ' ✓</span>').join('')}</div>
        </div>
        ${member}
        ${agrBtns(cl.id)}
        <div style="display:flex;gap:0.6rem;margin-top:0.45rem;flex-wrap:wrap">
          <button class="btn secondary" style="width:auto;padding:0.35rem 0.8rem;font-size:0.76rem" onclick="VR.noop()">${t('add_name')}</button>
          ${cl.member ? '<button class="btn secondary" style="width:auto;padding:0.35rem 0.8rem;font-size:0.76rem" onclick="VR.toggleCluster(\'' + cl.id + '\')">' + t(open ? 'hide_members' : 'show_members') + '</button>' : ''}
        </div>
      </div>`;
    }).join('');

    const ai = `
      <div class="aicard">
        <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
          <span class="sidechip against">${t('side_against')}</span>
          <span class="chip analysis">${t('ai_tag')}</span>
        </div>
        <div style="font-size:0.88rem;margin-top:0.4rem">${esc(D.ai['t_' + L])}</div>
        <div style="margin-top:0.35rem;display:flex;gap:0.3rem;flex-wrap:wrap">${D.ai.cites.map(c => '<span class="chip cite">▣ ' + esc(c) + ' · ' + t('archived') + ' ✓</span>').join('')}</div>
        <div style="font-size:0.7rem;color:var(--muted);margin-top:0.4rem">${t('ai_note')}</div>
        ${agrBtns(D.ai.id)}
        <button class="btn secondary" style="width:auto;padding:0.35rem 0.8rem;font-size:0.76rem;margin-top:0.45rem" onclick="VR.noop()">${t('rebut')}</button>
      </div>`;

    main = cards + ai + '<div class="privnote private" style="margin:0.2rem 0 0.6rem"><span class="dot"></span><span>' + t('agr_priv') + '</span></div>';
  } else {
    const camps = D.camps.map(cp => `
      <div class="campcard">
        <div style="display:flex;gap:0.5rem;align-items:baseline">
          <span style="font-weight:750">${esc(cp['name_' + L])}</span>
          <span style="font-size:0.7rem;color:var(--muted)">${cp.n} ${t('members_n')}</span>
        </div>
        <div style="font-size:0.66rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);margin-top:0.35rem">${t('c_defining')}</div>
        <ul style="margin:0.25rem 0 0;font-size:0.82rem">${cp['pts_' + L].map(p => '<li>' + esc(p) + '</li>').join('')}</ul>
      </div>`).join('');
    main = '<p style="font-size:0.78rem;color:var(--muted)">' + t('camps_p') + '</p>' + camps +
      '<div class="bridge"><span class="bl">' + t('bridging_lbl') + '</span><div style="font-size:0.88rem">' + esc(D['bridging_' + L]) + '</div></div>';
  }

  // composer with claim-detection prompt
  let composer;
  if (S.claim === null || S.claim === 'prompt') {
    composer = `
      <div class="card">
        <h4>${t('composer_h')}</h4>
        <textarea class="statement" id="composer" aria-label="${t('composer_h')}">${esc(D['composer_' + L])}</textarea>
        ${S.claim === 'prompt' ? `
          <div class="claimprompt">
            <strong>${t('claim_q')}</strong>
            <div style="font-size:0.76rem;color:var(--muted);margin-top:0.2rem">“$12M …”</div>
            <div class="row">
              <button onclick="VR.claimAnswer('src')">${t('claim_add')}</button>
              <button onclick="VR.claimAnswer('op')">${t('claim_op')}</button>
              <button onclick="VR.claimAnswer('dis')">${t('claim_dismiss')}</button>
            </div>
          </div>` : ''}
        ${S.claim === null ? '<button class="btn" style="margin-top:0.5rem" onclick="VR.tryPost()">' + t('post') + '</button>' : ''}
        <div class="privnote public" style="margin-top:0.4rem"><span class="dot"></span><span>${t('post_pub')}</span></div>
      </div>`;
  } else {
    const msg = S.claim === 'src' ? t('posted_src') : S.claim === 'op' ? t('posted_op') : t('posted_dis');
    composer = `
      <div class="card">
        <h4>${t('composer_h')}</h4>
        <div class="pill pending" style="margin-top:0.3rem">⟳ ${msg}</div>
        ${S.claim === 'src' ? '<div style="margin-top:0.4rem"><span class="chip cite">▣ ' + (S.lang === 'es' ? 'Informe fiscal del condado · 2026' : 'County fiscal report · 2026') + ' · ' + t('archived') + ' ✓</span></div>' : ''}
      </div>`;
  }

  const cm = COMMENTATORS[D.commentary.c];
  const commentary = `
    <div class="card analysis">
      <div style="display:flex;gap:0.4rem;align-items:center;flex-wrap:wrap">
        <h4 style="flex:1;margin:0">${t('comm_h')}</h4>
        <span class="chip analysis">${t('comm_reg')}</span>
      </div>
      <div class="commitem"><div class="ct">${esc(D.commentary['t_' + L])}</div>
      <div class="cb">${esc(cm.name)} · ${esc(cm.outlet)} · ${D.commentary.d}</div></div>
      <div style="font-size:0.7rem;color:var(--muted);border-top:1px solid var(--line);margin-top:0.35rem;padding-top:0.35rem">${t('comm_blackout')}</div>
    </div>`;

  return `
    <div style="display:flex;gap:0.45rem;align-items:center;flex-wrap:wrap">
      <span class="chip adv">${t('unofficial')}</span>
      <span class="chip band b1">${t('amended')}</span>
    </div>
    <div class="serif" style="font-size:1.3rem;font-weight:700;line-height:1.25;margin-top:0.4rem">${esc(D['title_' + L])}</div>
    <div style="font-size:0.74rem;color:var(--muted);margin-top:0.2rem">${t('deb_status')} · ${t('deb_seconded')}</div>
    ${body}
    <button class="btn secondary" style="width:auto;padding:0.3rem 0.8rem;font-size:0.74rem" onclick="VR.toggleOrig()">${t(S.showOrig ? 'view_curr' : 'view_orig')}</button>
    ${ctq}
    <div class="seg" role="group" style="margin:0.8rem 0 0.4rem">
      <button aria-pressed="${S.dv === 'clusters'}" onclick="VR.setDv('clusters')">${t('view_clusters')}</button>
      <button aria-pressed="${S.dv === 'camps'}" onclick="VR.setDv('camps')">${t('view_camps')}</button>
    </div>
    ${main}
    ${composer}
    ${commentary}
    <div class="disclosure"><span class="tag">${t('unofficial')}</span><span>${t('ref_next')} ${t('mandate_disc')}</span></div>`;
}

/* ─────────────────────────── admin console (EN-only internal tool) ── */
function renderAdmin() {
  const A = S.adm;
  let body = '';

  if (A.tab === 'disputes') {
    const F = ADMIN.focalFlag;
    const events = [
      { d: '07-10', who: 'System', txt: 'Flag opened — ' + F.origin, always: true },
      { d: '07-16', who: 'Staff', txt: 'Evidence attached', cite: F.evidence, at: 1 },
      { d: '07-16', who: 'System', txt: 'Right of reply sent to the campaign — 14-day window opens', at: 2 },
      { d: '07-19', who: 'Candidate', txt: 'Reply received: ' + F.reply, at: 3 },
    ].filter(e => e.always || A.stage >= e.at);
    if (A.resolved) events.push({ d: '07-20', who: 'Staff', txt: A.resolved === 'upheld' ? 'Resolved: UPHELD — published with evidence and the candidate’s reply attached' : 'Resolved: DISMISSED — reply and evidence retained in the append-only record' });
    const timeline = events.map(e =>
      '<div class="histline"><span class="hd">' + e.d + '</span><span class="hl">' + esc(e.who) + '</span><span style="flex:1;min-width:14ch">' + esc(e.txt) + '</span>' + (e.cite ? '<span class="chip cite">▣ ' + esc(e.cite) + '</span>' : '') + '</div>').join('');

    let actions = '';
    if (A.resolved) {
      actions = A.resolved === 'upheld'
        ? '<span class="pill published">✗ Upheld · published</span>'
        : '<span class="pill neutral">Dismissed — never published</span>';
    } else if (A.stage === 0) {
      actions = '<button class="btn secondary" style="width:auto" onclick="VR.admStage(1)">Attach evidence (citation)</button>';
    } else if (A.stage === 1) {
      actions = '<button class="btn secondary" style="width:auto" onclick="VR.admStage(2)">Send right of reply</button>';
    } else if (A.stage === 2) {
      actions = '<button class="btn secondary" style="width:auto" onclick="VR.admStage(3)">Simulate: reply received</button>';
    } else {
      actions = '<button class="btn secondary" style="width:auto" onclick="VR.admResolve(\'upheld\')">Uphold &amp; publish</button> <button class="btn secondary" style="width:auto" onclick="VR.admResolve(\'dismissed\')">Dismiss</button>';
    }
    const gate = A.resolved
      ? ''
      : '<button class="gatebtn" disabled>Publish flag — blocked<small>CHECK (NOT published OR status &lt;&gt; \'open\') — a flag in dispute can never go public</small></button>';

    const others = ADMIN.otherFlags.map(f =>
      '<tr><td class="cn">' + esc(f.who) + '</td><td style="text-align:left">' + esc(f.desc) + '</td><td>' +
      (f.status === 'published' ? '<span class="pill published">✗ upheld · published</span>' : '<span class="pill neutral">dismissed</span>') +
      '<div style="font-size:0.68rem;color:var(--muted);margin-top:0.2rem">' + esc(f.note) + '</div></td></tr>').join('');

    body = `
      <h2>Integrity-flag dispute queue</h2>
      <p style="font-size:0.82rem;color:var(--muted);max-width:70ch">The §2.3 workflow, operable: evidence before publication, right of reply before resolution, append-only history throughout. The publish gate is a database constraint, not this console's good behavior.</p>
      <div class="card">
        <div class="qmeta"><span class="who">${esc(F.who)}</span><span class="pill ${A.resolved ? (A.resolved === 'upheld' ? 'published' : 'neutral') : 'open'}">${A.resolved ? A.resolved : (A.stage >= 2 ? 'awaiting reply' : 'open')}</span></div>
        <div style="font-size:0.86rem;margin-top:0.3rem">${esc(F.desc)}</div>
        <div style="margin-top:0.55rem">${timeline}</div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;margin-top:0.6rem">${actions} ${gate}</div>
      </div>
      <h2>Recently resolved</h2>
      <div class="mgridwrap"><table class="mgrid"><tr><th style="text-align:left;padding-left:0.6rem">Politician</th><th style="text-align:left">Flag</th><th style="text-align:left">Outcome</th></tr>${others}</table></div>`;
  } else {
    const usable = 1 + Object.values(A.queue).filter(v => v === 'confirmed').length;
    const cards = ADMIN.queue.map(q => {
      const st = A.queue[q.id];
      const val = A.values[q.id];
      let foot;
      if (st === 'confirmed') foot = '<span class="pill kept">✓ confirmed · usable_for_scoring = TRUE</span>';
      else if (st === 'rejected') foot = '<span class="pill neutral">rejected — never usable</span>';
      else foot = `
        <div class="valrow">
          <button aria-label="decrease" onclick="VR.admVal('${q.id}',-1)">−</button>
          <span class="vv">${val > 0 ? '+' + val : val}</span>
          <button aria-label="increase" onclick="VR.admVal('${q.id}',1)">+</button>
          <button class="btn secondary" style="width:auto;padding:0.4rem 0.9rem;font-size:0.8rem" onclick="VR.admCode('${q.id}','confirmed')">Confirm coding</button>
          <button class="btn secondary" style="width:auto;padding:0.4rem 0.9rem;font-size:0.8rem" onclick="VR.admCode('${q.id}','rejected')">Reject</button>
        </div>
        <div style="font-size:0.68rem;color:var(--muted);margin-top:0.3rem">Model suggested ${q.suggested > 0 ? '+' + q.suggested : q.suggested} — a suggestion never scores anyone until a human confirms it (usable_for_scoring stays FALSE).</div>`;
      return `
      <div class="card">
        <div class="qmeta"><span class="who">${esc(q.who)}</span><span class="axis">${esc(q.axis)}</span><span class="pill ${st === 'confirmed' ? 'kept' : st === 'rejected' ? 'neutral' : 'open'}">${st}</span></div>
        <div style="font-weight:650;font-size:0.88rem;margin-top:0.35rem">${esc(q.q)}</div>
        <div class="poles"><span>${esc(q.neg)}</span><span>${esc(q.pos)}</span></div>
        <div class="repq"><div style="font-style:italic">${esc(q.excerpt)}</div></div>
        <span class="chip cite">▣ ${esc(q.src)}</span>
        <div style="margin-top:0.45rem">${foot}</div>
      </div>`;
    }).join('');
    body = `
      <h2>Position-coding queue</h2>
      <p style="font-size:0.82rem;color:var(--muted);max-width:70ch">SCORING.md §S2, operable: the source excerpt, its citation, and the axis question side by side. Adjust the value if the model’s suggestion is off, then confirm — or reject. Only confirmed rows can ever score a candidate.</p>
      <div class="card raised" style="font-size:0.82rem"><strong>${usable} of 4</strong> codings usable for scoring (1 staff-coded — usable immediately; 3 model-suggested — gated on confirmation).</div>
      ${cards}`;
  }

  document.getElementById('view-admin').innerHTML = `
    <div class="banner"><span>🔒</span><span>Internal tool — trusted, trained operators. Deliberately plain and dense; English-only by design (the voter product is bilingual). Every action lands in an append-only event log.</span></div>
    <div class="admtabs" role="group">
      <button aria-pressed="${A.tab === 'disputes'}" onclick="VR.admTab('disputes')">Integrity disputes</button>
      <button aria-pressed="${A.tab === 'coding'}" onclick="VR.admTab('coding')">Position coding</button>
    </div>
    ${body}`;
}

/* ─────────────────────────── shell & wiring ────────────────── */
const TITLES = { welcome: 'app_title', ballot: 'ballot_title', prio: 'prio_title', results: 'results_title', detail: 'detail_title', mandates: 'm_grid_title', promises: 'promises_title', thread: 'thread_title' };
function render() {
  document.getElementById('app-title').textContent = t(TITLES[S.screen]);
  document.getElementById('app-where').textContent = t('county');
  document.getElementById('btn-back').classList.toggle('hidden', S.screen === 'welcome');
  const app = document.getElementById('app');
  app.innerHTML = S.screen === 'welcome' ? renderWelcome()
    : S.screen === 'ballot' ? renderBallot()
    : S.screen === 'prio' ? renderPrio()
    : S.screen === 'results' ? renderResults()
    : S.screen === 'mandates' ? renderMandates()
    : S.screen === 'promises' ? renderPromises()
    : S.screen === 'thread' ? renderThread()
    : renderDetail();
  app.scrollTop = 0;
}

window.VR = {
  go(s) { S.screen = s; render(); },
  back() {
    S.screen = S.screen === 'thread' ? S.threadBack
      : S.screen === 'promises' ? 'detail'
      : S.screen === 'mandates' ? 'results'
      : S.screen === 'detail' ? 'results'
      : S.screen === 'results' ? 'prio'
      : S.screen === 'prio' ? 'ballot'
      : 'welcome';
    render();
  },
  setAddr(a) { S.addr = a; render(); },
  pickRace(r) {
    S.race = r;
    S.screen = Object.keys(S.prios).length >= 3 ? 'results' : 'prio';
    render();
  },
  openGrid() { S.cell = null; S.screen = 'mandates'; render(); },
  selCell(cid, mid) { S.cell = { cid, mid }; render(); },
  openThread(from) { S.threadBack = from; S.screen = 'thread'; render(); },
  setDv(v) { S.dv = v; render(); },
  toggleOrig() { S.showOrig = !S.showOrig; render(); },
  toggleCluster(id) { S.openCluster = S.openCluster === id ? null : id; render(); },
  ctqVote() { S.ctq = true; render(); },
  agr(id, v) { S.agreeVotes[id] = S.agreeVotes[id] === v ? undefined : v; render(); },
  tryPost() { S.claim = 'prompt'; render(); },
  claimAnswer(a) { S.claim = a; render(); },
  noop() {},
  toggleTopic(id) {
    if (!S.prios[id]) {
      const tp = TOPICS.find(x => x.id === id);
      S.prios[id] = { statement: tp['p_' + S.lang], stance: 1, w: 3 };
      S.open = id;
    } else if (S.open === id) {
      delete S.prios[id]; S.open = null;
    } else {
      S.open = id;
    }
    render();
  },
  setStmt(id, v) { S.prios[id].statement = v; },
  setStance(id, v) { S.prios[id].stance = v; render(); },
  setW(id, d) { S.prios[id].w = Math.max(1, Math.min(5, S.prios[id].w + d)); render(); },
  setRace(r) { S.race = r; render(); },
  openCand(id) { S.candId = id; S.screen = 'detail'; render(); },
  setLang(l) {
    const old = S.lang; S.lang = l;
    document.getElementById('lang-en').setAttribute('aria-pressed', l === 'en');
    document.getElementById('lang-es').setAttribute('aria-pressed', l === 'es');
    for (const [tid, p] of Object.entries(S.prios)) {
      const tp = TOPICS.find(x => x.id === tid);
      if (p.statement === tp['p_' + old]) p.statement = tp['p_' + l];
    }
    render();
  },
  setView(v) {
    S.view = v;
    document.getElementById('view-proto').classList.toggle('hidden', v !== 'proto');
    document.getElementById('view-sys').classList.toggle('hidden', v !== 'sys');
    document.getElementById('view-admin').classList.toggle('hidden', v !== 'admin');
    document.getElementById('tab-proto').setAttribute('aria-selected', v === 'proto');
    document.getElementById('tab-sys').setAttribute('aria-selected', v === 'sys');
    document.getElementById('tab-admin').setAttribute('aria-selected', v === 'admin');
    if (v === 'admin') renderAdmin();
  },
  admTab(tb) { S.adm.tab = tb; renderAdmin(); },
  admStage(n) { S.adm.stage = n; renderAdmin(); },
  admResolve(r) { S.adm.resolved = r; renderAdmin(); },
  admVal(id, d) { S.adm.values[id] = Math.max(-2, Math.min(2, S.adm.values[id] + d)); renderAdmin(); },
  admCode(id, st) { S.adm.queue[id] = st; renderAdmin(); }
};

document.getElementById('btn-back').addEventListener('click', VR.back);
document.getElementById('tab-proto').addEventListener('click', () => VR.setView('proto'));
document.getElementById('tab-sys').addEventListener('click', () => VR.setView('sys'));
document.getElementById('tab-admin').addEventListener('click', () => VR.setView('admin'));
document.getElementById('lang-en').addEventListener('click', () => VR.setLang('en'));
document.getElementById('lang-es').addEventListener('click', () => VR.setLang('es'));
render();
</script>
